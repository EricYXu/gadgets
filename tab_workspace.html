<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef0f2;
    --surface: #ffffff;
    --surface2: #f4f5f7;
    --border: #d8dce2;
    --accent: #2563eb;
    --accent2: #0ea5e9;
    --text: #1a1d23;
    --text-dim: #5a6070;
    --text-muted: #a0a8b8;
    --tab-bar: #f4f5f7;
    --shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* Toolbar */
  #toolbar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 8px;
    background: rgba(23,23,26,0.92);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 16px;
    backdrop-filter: blur(20px);
    box-shadow: 0 2px 16px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.06);
  }

  #toolbar button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 7px 16px;
    border-radius: 40px;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #toolbar button:hover {
    color: var(--text);
    background: var(--surface2);
  }

  #toolbar button.primary {
    background: var(--accent);
    color: #ffffff;
    font-weight: 700;
  }

  #toolbar button.primary:hover {
    background: #1d4ed8;
    transform: scale(1.04);
  }

  #toolbar .sep {
    width: 1px;
    background: var(--border);
    margin: 4px 2px;
  }

  /* Panel */
  .panel {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-width: 200px;
    min-height: 120px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }

  .panel.active {
    box-shadow: var(--shadow), 0 0 0 2px var(--accent);
    z-index: 100 !important;
  }

  .panel.dragging {
    opacity: 0.92;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15), 0 0 0 2px var(--accent);
    cursor: grabbing;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    align-items: stretch;
    background: var(--tab-bar);
    border-bottom: 1px solid var(--border);
    min-height: 36px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-drag-handle {
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: grab;
    color: var(--text-muted);
    flex-shrink: 0;
    font-size: 11px;
  }
  .tab-drag-handle:active { cursor: grabbing; }

  .tab-list {
    display: flex;
    align-items: stretch;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-list::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    cursor: pointer;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    transition: background 0.12s, color 0.12s;
    position: relative;
    min-width: 80px;
    max-width: 160px;
    user-select: none;
  }

  .tab:hover { background: var(--surface2); color: var(--text); }

  .tab.active {
    color: var(--text);
    background: var(--surface);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  .tab-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tab-name-input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 90px;
    outline: none;
    padding: 0;
  }

  .tab-close {
    opacity: 0;
    font-size: 14px;
    line-height: 1;
    color: var(--text-muted);
    padding: 2px;
    border-radius: 3px;
    transition: opacity 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .tab:hover .tab-close { opacity: 1; }
  .tab-close:hover { color: #ff6b6b; }

  .tab-add {
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.12s;
  }
  .tab-add:hover { color: var(--accent); }

  .panel-controls {
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
    flex-shrink: 0;
  }

  .panel-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .panel-btn:hover { background: var(--surface2); color: var(--text); }
  .panel-btn.close:hover { color: #ff6b6b; }

  /* Content area */
  .panel-content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .tab-content {
    display: none;
    position: absolute;
    inset: 0;
  }
  .tab-content.active { display: block; }

  .editor {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    padding: 16px 20px;
    resize: none;
    outline: none;
    caret-color: var(--accent);
  }

  .editor::placeholder { color: var(--text-muted); }
  .editor::selection { background: rgba(37,99,235,0.15); }

  /* Resize handles */
  .resize-handle {
    position: absolute;
    z-index: 10;
  }
  .resize-e  { right: -3px; top: 5px; bottom: 5px; width: 6px; cursor: e-resize; }
  .resize-w  { left: -3px; top: 5px; bottom: 5px; width: 6px; cursor: w-resize; }
  .resize-s  { bottom: -3px; left: 5px; right: 5px; height: 6px; cursor: s-resize; }
  .resize-n  { top: -3px; left: 5px; right: 5px; height: 6px; cursor: n-resize; }
  .resize-se { right: -4px; bottom: -4px; width: 12px; height: 12px; cursor: se-resize; }
  .resize-sw { left: -4px; bottom: -4px; width: 12px; height: 12px; cursor: sw-resize; }
  .resize-ne { right: -4px; top: -4px; width: 12px; height: 12px; cursor: ne-resize; }
  .resize-nw { left: -4px; top: -4px; width: 12px; height: 12px; cursor: nw-resize; }

  /* Corner indicator */
  .resize-se::after {
    content: '';
    position: absolute;
    right: 4px; bottom: 4px;
    width: 8px; height: 8px;
    border-right: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-radius: 0 0 2px 0;
  }

  /* Empty state */
  #empty-state {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 0;
    pointer-events: none;
  }

  #empty-state h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text-muted);
    letter-spacing: -0.02em;
  }

  #empty-state p {
    font-size: 13px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* Toast */
  #toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div id="canvas"></div>

<div id="empty-state">
  <h1>WORKSPACE</h1>
  <p>Press "New Panel" to get started</p>
</div>

<div id="toolbar">
  <button class="primary" onclick="createPanel()">＋ New Panel</button>
  <div class="sep"></div>
  <button onclick="saveAll()">⬡ Save</button>
  <button onclick="clearAll()">⌫ Clear All</button>
</div>

<div id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const emptyState = document.getElementById('empty-state');
const toast = document.getElementById('toast');

let panels = [];
let zCounter = 10;
let activePanel = null;

// ─── Storage ────────────────────────────────────────────
const STORAGE_KEY = 'ws_panels_v2';

function saveAll() {
  const data = panels.map(p => ({
    id: p.id,
    x: parseInt(p.el.style.left),
    y: parseInt(p.el.style.top),
    w: parseInt(p.el.style.width),
    h: parseInt(p.el.style.height),
    activeTabId: p.activeTabId,
    tabs: p.tabs.map(t => ({ id: t.id, name: t.name, content: t.textarea.value }))
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showToast('Saved ✓');
}

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    data.forEach(d => {
      const p = createPanel(d.x, d.y, d.w, d.h, false);
      // Replace default tab with saved tabs
      // Remove default tab first
      p.tabs.forEach(t => removeDomTab(p, t, false));
      p.tabs = [];
      d.tabs.forEach(t => {
        addTab(p, t.name, t.content, t.id, false);
      });
      switchTab(p, d.activeTabId || p.tabs[0]?.id);
    });
  } catch(e) { console.warn('Load error', e); }
}

// auto-save on edit
function autoSave() { localStorage.setItem(STORAGE_KEY, (() => {
  const data = panels.map(p => ({
    id: p.id,
    x: parseInt(p.el.style.left),
    y: parseInt(p.el.style.top),
    w: parseInt(p.el.style.width),
    h: parseInt(p.el.style.height),
    activeTabId: p.activeTabId,
    tabs: p.tabs.map(t => ({ id: t.id, name: t.name, content: t.textarea.value }))
  }));
  return JSON.stringify(data);
})()); }

function clearAll() {
  if (!confirm('Clear all panels?')) return;
  panels.forEach(p => p.el.remove());
  panels = [];
  localStorage.removeItem(STORAGE_KEY);
  updateEmpty();
  showToast('Cleared');
}

// ─── Panel Factory ───────────────────────────────────────
let pidCounter = 0;

function createPanel(x, y, w, h, addDefaultTab = true) {
  pidCounter++;
  const id = 'p' + Date.now() + pidCounter;

  // Smart placement if no coords given
  if (x === undefined) {
    const offset = (panels.length % 6) * 30;
    x = 60 + offset;
    y = 60 + offset;
    w = 420;
    h = 300;
  }

  const el = document.createElement('div');
  el.className = 'panel';
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zCounter}`;
  el.dataset.id = id;

  // Tab bar
  const tabBar = document.createElement('div');
  tabBar.className = 'tab-bar';

  const dragHandle = document.createElement('div');
  dragHandle.className = 'tab-drag-handle';
  dragHandle.innerHTML = '⠿';
  dragHandle.title = 'Drag panel';

  const tabList = document.createElement('div');
  tabList.className = 'tab-list';

  const tabAdd = document.createElement('div');
  tabAdd.className = 'tab-add';
  tabAdd.innerHTML = '+';
  tabAdd.title = 'New tab';

  const controls = document.createElement('div');
  controls.className = 'panel-controls';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'panel-btn close';
  closeBtn.innerHTML = '×';
  closeBtn.title = 'Close panel';
  controls.appendChild(closeBtn);

  tabBar.appendChild(dragHandle);
  tabBar.appendChild(tabList);
  tabBar.appendChild(tabAdd);
  tabBar.appendChild(controls);

  // Content area
  const content = document.createElement('div');
  content.className = 'panel-content';

  // Resize handles
  ['n','s','e','w','ne','nw','se','sw'].forEach(dir => {
    const h = document.createElement('div');
    h.className = `resize-handle resize-${dir}`;
    h.dataset.dir = dir;
    el.appendChild(h);
  });

  el.appendChild(tabBar);
  el.appendChild(content);
  canvas.appendChild(el);

  const panel = { id, el, tabBar, tabList, content, tabs: [], activeTabId: null };
  panels.push(panel);

  // Events
  dragHandle.addEventListener('mousedown', e => startDrag(e, panel));
  closeBtn.addEventListener('click', () => removePanel(panel));
  tabAdd.addEventListener('click', () => { addTab(panel); autoSave(); });

  el.addEventListener('mousedown', () => bringToFront(panel));

  // Resize
  el.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', e => startResize(e, panel, handle.dataset.dir));
  });

  if (addDefaultTab) addTab(panel, 'Note', '', null, true);

  updateEmpty();
  bringToFront(panel);
  return panel;
}

function removePanel(panel) {
  panel.el.remove();
  panels = panels.filter(p => p.id !== panel.id);
  updateEmpty();
  autoSave();
}

function bringToFront(panel) {
  panel.el.style.zIndex = ++zCounter;
  panels.forEach(p => p.el.classList.remove('active'));
  panel.el.classList.add('active');
  activePanel = panel;
}

function updateEmpty() {
  emptyState.style.display = panels.length === 0 ? 'flex' : 'none';
}

// ─── Tabs ────────────────────────────────────────────────
let tidCounter = 0;

function addTab(panel, name = 'Note', content = '', id = null, switchToIt = true) {
  tidCounter++;
  const tid = id || ('t' + Date.now() + tidCounter);

  // Tab element
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.dataset.tid = tid;

  const nameSpan = document.createElement('span');
  nameSpan.className = 'tab-name';
  nameSpan.textContent = name;

  const closeSpan = document.createElement('span');
  closeSpan.className = 'tab-close';
  closeSpan.innerHTML = '×';

  tab.appendChild(nameSpan);
  tab.appendChild(closeSpan);
  panel.tabList.appendChild(tab);

  // Content
  const contentDiv = document.createElement('div');
  contentDiv.className = 'tab-content';
  contentDiv.dataset.tid = tid;

  const textarea = document.createElement('textarea');
  textarea.className = 'editor';
  textarea.placeholder = 'Start typing…';
  textarea.value = content;
  textarea.spellcheck = true;
  contentDiv.appendChild(textarea);
  panel.content.appendChild(contentDiv);

  const tabObj = { id: tid, name, tab, nameSpan, textarea, contentDiv };
  panel.tabs.push(tabObj);

  // Events
  tab.addEventListener('click', (e) => {
    if (e.target === closeSpan) return;
    bringToFront(panel);
    switchTab(panel, tid);
  });

  nameSpan.addEventListener('dblclick', () => startRenameTab(panel, tabObj));
  closeSpan.addEventListener('click', () => { removeDomTab(panel, tabObj); autoSave(); });
  textarea.addEventListener('input', autoSave);
  textarea.addEventListener('mousedown', e => e.stopPropagation());

  if (switchToIt) switchTab(panel, tid);
  return tabObj;
}

function switchTab(panel, tid) {
  panel.tabs.forEach(t => {
    t.tab.classList.toggle('active', t.id === tid);
    t.contentDiv.classList.toggle('active', t.id === tid);
  });
  panel.activeTabId = tid;
  // Focus textarea
  const tabObj = panel.tabs.find(t => t.id === tid);
  if (tabObj) setTimeout(() => tabObj.textarea.focus(), 0);
}

function removeDomTab(panel, tabObj, save = true) {
  tabObj.tab.remove();
  tabObj.contentDiv.remove();
  panel.tabs = panel.tabs.filter(t => t.id !== tabObj.id);
  if (panel.tabs.length === 0) {
    removePanel(panel);
  } else if (panel.activeTabId === tabObj.id) {
    switchTab(panel, panel.tabs[panel.tabs.length - 1].id);
  }
  if (save) autoSave();
}

function startRenameTab(panel, tabObj) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'tab-name-input';
  input.value = tabObj.name;
  tabObj.nameSpan.replaceWith(input);
  input.focus();
  input.select();

  const finish = () => {
    const newName = input.value.trim() || 'Note';
    tabObj.name = newName;
    const span = document.createElement('span');
    span.className = 'tab-name';
    span.textContent = newName;
    span.addEventListener('dblclick', () => startRenameTab(panel, tabObj));
    input.replaceWith(span);
    tabObj.nameSpan = span;
    autoSave();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { e.preventDefault(); finish(); }
  });
}

// ─── Drag ────────────────────────────────────────────────
function startDrag(e, panel) {
  e.preventDefault();
  bringToFront(panel);
  const startX = e.clientX;
  const startY = e.clientY;
  const origX = parseInt(panel.el.style.left);
  const origY = parseInt(panel.el.style.top);
  panel.el.classList.add('dragging');

  const move = e => {
    panel.el.style.left = Math.max(0, origX + e.clientX - startX) + 'px';
    panel.el.style.top = Math.max(0, origY + e.clientY - startY) + 'px';
  };
  const up = () => {
    panel.el.classList.remove('dragging');
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    autoSave();
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// ─── Resize ──────────────────────────────────────────────
function startResize(e, panel, dir) {
  e.preventDefault();
  e.stopPropagation();
  bringToFront(panel);

  const startX = e.clientX;
  const startY = e.clientY;
  const origLeft = parseInt(panel.el.style.left);
  const origTop = parseInt(panel.el.style.top);
  const origW = parseInt(panel.el.style.width);
  const origH = parseInt(panel.el.style.height);
  const minW = 200, minH = 120;

  const move = e => {
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    let l = origLeft, t = origTop, w = origW, h = origH;

    if (dir.includes('e')) w = Math.max(minW, origW + dx);
    if (dir.includes('s')) h = Math.max(minH, origH + dy);
    if (dir.includes('w')) { w = Math.max(minW, origW - dx); l = origLeft + origW - w; }
    if (dir.includes('n')) { h = Math.max(minH, origH - dy); t = origTop + origH - h; }

    panel.el.style.left = l + 'px';
    panel.el.style.top = t + 'px';
    panel.el.style.width = w + 'px';
    panel.el.style.height = h + 'px';
  };

  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    autoSave();
  };

  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// ─── Toast ───────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ─── Keyboard shortcuts ──────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveAll(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); createPanel(); }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'T') {
    e.preventDefault();
    if (activePanel) { addTab(activePanel); autoSave(); }
  }
});

// ─── Init ────────────────────────────────────────────────
loadAll();
if (panels.length === 0) updateEmpty();
</script>
</body>
</html>
