<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Day Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0c;
    --paper: #f5f2ec;
    --cream: #ede9df;
    --rule: #c9c3b4;
    --accent: #b85c2a;
    --accent-soft: #f0e0d4;
    --muted: #7a7366;
    --serif: 'DM Serif Display', Georgia, serif;
    --mono: 'DM Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── INPUT SCREEN ── */
  #input-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  #input-screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-12px);
    position: absolute;
    width: 100%;
  }

  .card {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 32px;
    width: 100%;
    max-width: 580px;
    box-shadow: 4px 4px 0 var(--rule);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="time"], input[type="text"], textarea, select {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 1px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 130px;
    line-height: 1.7;
  }

  .hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 24px 0;
  }

  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  /* ── RIGOR SLIDER ── */
  .rigor-wrap {
    margin-bottom: 24px;
  }

  .rigor-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .rigor-labels span {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .rigor-labels span.active {
    color: var(--ink);
    font-weight: 500;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--rule);
    border-radius: 1px;
    outline: none;
    padding: 0;
    cursor: pointer;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1.5px var(--ink);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1.5px var(--ink);
    cursor: pointer;
  }

  input[type="range"]:hover::-webkit-slider-thumb {
    background: var(--accent);
    box-shadow: 0 0 0 1.5px var(--accent);
  }

  /* ── BUTTON ── */
  .btn-primary {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 1px;
    padding: 14px 24px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--accent); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { background: var(--rule); cursor: not-allowed; }

  /* ── LOADING ── */
  #loading-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--paper);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
  }

  #loading-screen.visible { display: flex; }

  .loader-bar {
    width: 200px;
    height: 1px;
    background: var(--rule);
    position: relative;
    overflow: hidden;
  }

  .loader-bar::after {
    content: '';
    position: absolute;
    left: -60%;
    top: 0;
    height: 100%;
    width: 60%;
    background: var(--accent);
    animation: sweep 1.2s ease-in-out infinite;
  }

  @keyframes sweep {
    0% { left: -60%; }
    100% { left: 100%; }
  }

  /* ── TIMELINE SCREEN ── */
  #timeline-screen {
    display: none;
    min-height: 100vh;
    padding: 48px 24px;
    max-width: 780px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  #timeline-screen.visible { display: block; }
  #timeline-screen.shown { opacity: 1; transform: translateY(0); }

  .tl-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .tl-title {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    line-height: 1.1;
  }

  .tl-title span {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .btn-reset {
    background: none;
    border: 1px solid var(--rule);
    border-radius: 1px;
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
    align-self: flex-start;
  }

  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* Timeline */
  .timeline { position: relative; }

  .timeline::before {
    content: '';
    position: absolute;
    left: 86px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--rule);
  }

  .tl-item {
    display: grid;
    grid-template-columns: 86px 1fr;
    gap: 0;
    margin-bottom: 4px;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .tl-item.appeared { opacity: 1; transform: translateX(0); }

  .tl-time {
    padding: 16px 16px 16px 0;
    text-align: right;
    line-height: 1.2;
  }

  .tl-time .t-start {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
    display: block;
  }

  .tl-time .t-end {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .tl-body {
    padding: 12px 0 12px 24px;
    position: relative;
  }

  .tl-body::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 22px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--paper);
    border: 1.5px solid var(--rule);
  }

  .tl-item.meal .tl-body::before {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .tl-item.focus .tl-body::before {
    background: var(--ink);
    border-color: var(--ink);
    width: 9px;
    height: 9px;
  }

  .tl-item.break .tl-body::before {
    background: var(--cream);
    border-color: var(--rule);
    width: 6px;
    height: 6px;
    top: 24px;
    left: -3px;
  }

  .tl-card {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 14px 18px;
    transition: box-shadow 0.2s;
  }

  .tl-card:hover { box-shadow: 3px 3px 0 var(--rule); }

  .tl-item.meal .tl-card {
    background: var(--accent-soft);
    border-color: #d9a080;
  }

  .tl-item.break .tl-card {
    background: transparent;
    border-style: dashed;
  }

  .tl-tag {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .tl-item.meal .tl-tag { color: var(--accent); }

  .tl-task {
    font-family: var(--serif);
    font-size: 1.05rem;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .tl-detail {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .tl-duration {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    border: 1px solid var(--rule);
    border-radius: 20px;
    padding: 1px 8px;
  }

  .tl-item.meal .tl-duration { border-color: #d9a080; }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    margin-bottom: 48px;
  }

  .summary-stat { display: flex; flex-direction: column; gap: 2px; }

  .summary-stat .val {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--ink);
  }

  .summary-stat .lbl {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Error */
  .error-box {
    background: #fdf0ec;
    border: 1px solid #e0a090;
    border-radius: 2px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--accent);
    margin-top: 16px;
    display: none;
  }

  @media (max-width: 500px) {
    .field-row, .options-row { grid-template-columns: 1fr; }
    .timeline::before { left: 72px; }
    .tl-item { grid-template-columns: 72px 1fr; }
  }
</style>
</head>
<body>

<!-- INPUT SCREEN -->
<div id="input-screen">
  <div class="card">
    <div class="field-row">
      <div class="field">
        <label>Day starts</label>
        <input type="time" id="start-time" value="08:00">
      </div>
      <div class="field">
        <label>Day ends</label>
        <input type="time" id="end-time" value="18:00">
      </div>
    </div>

    <div class="field" style="margin-bottom:20px">
      <label>Tasks &amp; commitments</label>
      <textarea id="tasks" placeholder="Write report for Q2 review&#10;Prep slides for board meeting&#10;1:1 with Sarah — performance discussion&#10;Code review for payment module&#10;Respond to investor emails&#10;Gym"></textarea>
      <p class="hint">One per line &middot; first task = highest priority, gets your best hours.</p>
    </div>

    <hr class="divider">

    <div class="options-row">
      <div class="field">
        <label>Energy pattern</label>
        <select id="energy">
          <option value="morning">Morning peak</option>
          <option value="afternoon">Afternoon peak</option>
          <option value="even">Steady throughout</option>
        </select>
      </div>
      <div class="field">
        <label>Meal preference</label>
        <select id="meals">
          <option value="standard">Breakfast, lunch, dinner</option>
          <option value="no-breakfast">Lunch &amp; dinner</option>
          <option value="no-dinner">Breakfast &amp; lunch</option>
          <option value="lunch-only">Lunch only</option>
        </select>
      </div>
    </div>

    <div class="field rigor-wrap" style="margin-bottom:20px">
      <label>Schedule rigor</label>
      <div class="rigor-labels">
        <span id="rl-1">Relaxed</span>
        <span id="rl-2" class="active">Balanced</span>
        <span id="rl-3">Rigorous</span>
      </div>
      <input type="range" id="rigor" min="1" max="3" step="1" value="2">
      <p class="hint" id="rigor-hint">Balanced — reasonable blocks with breathing room between tasks.</p>
    </div>

    <div class="field" style="margin-bottom:24px">
      <label>Any constraints or notes? <span style="opacity:.5">(optional)</span></label>
      <input type="text" id="notes" placeholder="e.g. fixed meeting at 2pm, school pickup at 4pm…">
    </div>

    <div class="field" style="margin-bottom:24px">
      <label>Anthropic API key</label>
      <input type="password" id="api-key" placeholder="sk-ant-api03-…">
    </div>

    <button class="btn-primary" id="plan-btn" onclick="generatePlan()">Plan my day →</button>
    <div class="error-box" id="error-box"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-bar"></div>
</div>

<!-- TIMELINE SCREEN -->
<div id="timeline-screen">
  <div class="tl-header">
    <div class="tl-title">
      <span>Your execution plan</span>
      Today's Schedule
    </div>
    <button class="btn-reset" onclick="reset()">← New plan</button>
  </div>

  <div class="timeline" id="timeline"></div>
  <div class="summary-bar" id="summary-bar"></div>
</div>

<script>
const STORAGE_KEY = 'exec-planner-schedule';
const API_KEY_STORAGE = 'exec-planner-api-key';

const rigorDescriptions = {
  1: 'Relaxed — generous time estimates, long breaks, low pressure.',
  2: 'Balanced — reasonable blocks with breathing room between tasks.',
  3: 'Rigorous — tight blocks, minimal idle time, maximum output.'
};

const rigorPromptMap = {
  1: 'Make it relaxed: generous time per task (add 30-50% buffer), long breaks (15-20 min), unhurried meals, no back-to-back intensity.',
  2: 'Make it balanced: realistic time estimates, short breaks (10 min) between intensive blocks, natural pacing.',
  3: 'Make it rigorous: tight time blocks with minimal slack, very short breaks (5 min only), stack tasks efficiently, maximize productive output across the full day.'
};

// Rigor slider interactivity
const rigorInput = document.getElementById('rigor');
rigorInput.addEventListener('input', updateRigor);

function updateRigor() {
  const v = parseInt(rigorInput.value);
  document.getElementById('rigor-hint').textContent = rigorDescriptions[v];
  [1,2,3].forEach(n => {
    document.getElementById('rl-' + n).className = n === v ? 'active' : '';
  });
}

// On load: restore saved schedule or show input
window.addEventListener('DOMContentLoaded', () => {
  const savedKey = localStorage.getItem(API_KEY_STORAGE);
  if (savedKey) document.getElementById('api-key').value = savedKey;

  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const { schedule, startTime, endTime } = JSON.parse(saved);
      renderTimeline(schedule, startTime, endTime, /* animate */ false);
      return;
    }
  } catch(e) { /* ignore corrupt data */ }
  // Nothing saved — show input screen normally (it's already visible)
});

async function generatePlan() {
  const startTime = document.getElementById('start-time').value;
  const endTime = document.getElementById('end-time').value;
  const tasks = document.getElementById('tasks').value.trim();
  const energy = document.getElementById('energy').value;
  const meals = document.getElementById('meals').value;
  const notes = document.getElementById('notes').value.trim();
  const rigor = parseInt(document.getElementById('rigor').value);
  const apiKey = document.getElementById('api-key').value.trim();
  const errBox = document.getElementById('error-box');

  errBox.style.display = 'none';

  if (!apiKey) {
    errBox.textContent = 'Please enter your Anthropic API key.';
    errBox.style.display = 'block';
    return;
  }

  if (!tasks) {
    errBox.textContent = 'Please enter at least one task.';
    errBox.style.display = 'block';
    return;
  }

  localStorage.setItem(API_KEY_STORAGE, apiKey);

  document.getElementById('plan-btn').disabled = true;
  document.getElementById('loading-screen').classList.add('visible');

  const energyMap = {
    morning: 'mornings (schedule deep/hard work early)',
    afternoon: 'afternoons (schedule deep/hard work after lunch)',
    even: 'evenly throughout the day'
  };

  const mealMap = {
    standard: 'breakfast, lunch, and dinner',
    'no-breakfast': 'lunch and dinner (no breakfast)',
    'no-dinner': 'breakfast and lunch (no dinner)',
    'lunch-only': 'lunch only'
  };

  // Number tasks so positional priority is explicit to the model
  const taskLines = tasks.split('\n').map(t => t.trim()).filter(Boolean);
  const numberedTasks = taskLines.map((t, i) => `${i + 1}. ${t}`).join('\n');
  const taskCount = taskLines.length;

  const prompt = `You are an elite executive assistant creating a detailed day schedule.

User's day: ${startTime} to ${endTime}

Tasks listed in PRIORITY ORDER — #1 is highest priority, #${taskCount} is lowest:
${numberedTasks}

Energy peak: ${energyMap[energy]}
Meals: ${mealMap[meals]}
${notes ? `Constraints/notes: ${notes}` : ''}
Rigor level: ${rigorPromptMap[rigor]}

Create a realistic, optimized day schedule. Rules:
- PRIORITY IS PARAMOUNT: Schedule task #1 in the user's peak energy window, task #2 in the next best slot, continuing in priority order. Lower-priority tasks fill remaining or lower-energy periods. Never place a high-priority task in a low-energy slot if a better one is available.
- Vary task types to maintain interest and prevent mental fatigue
- Include the specified meals at natural times
- Respect any stated constraints
- Every minute from start to end should be accounted for
- Apply the rigor level strictly

Return ONLY a JSON array. No markdown, no explanation. Each item has:
{
  "time": "HH:MM",
  "endTime": "HH:MM",
  "type": "focus" | "meeting" | "admin" | "break" | "meal" | "personal",
  "title": "short task title",
  "detail": "one sentence on how to approach this / what to do",
  "duration": "X min" or "X hr Y min"
}

Return the complete day from ${startTime} to ${endTime} with no gaps.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    let raw = data.content.map(b => b.text || '').join('');
    raw = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const schedule = JSON.parse(raw);

    // Persist to localStorage
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ schedule, startTime, endTime }));

    renderTimeline(schedule, startTime, endTime, /* animate */ true);

  } catch (err) {
    document.getElementById('loading-screen').classList.remove('visible');
    document.getElementById('plan-btn').disabled = false;
    errBox.textContent = 'Something went wrong: ' + err.message;
    errBox.style.display = 'block';
  }
}

function renderTimeline(schedule, startTime, endTime, animate = true) {
  const container = document.getElementById('timeline');
  const summaryBar = document.getElementById('summary-bar');
  container.innerHTML = '';
  summaryBar.innerHTML = '';

  const focusBlocks = schedule.filter(i => i.type === 'focus').length;
  const mealCount = schedule.filter(i => i.type === 'meal').length;

  const typeLabels = {
    focus: 'Deep work', meeting: 'Meeting', admin: 'Admin',
    break: 'Break', meal: 'Meal', personal: 'Personal'
  };

  schedule.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = `tl-item ${item.type === 'meal' ? 'meal' : item.type === 'break' ? 'break' : item.type === 'focus' ? 'focus' : ''}`;

    div.innerHTML = `
      <div class="tl-time">
        <span class="t-start">${fmt(item.time)}</span>
        <span class="t-end">${fmt(item.endTime)}</span>
      </div>
      <div class="tl-body">
        <div class="tl-card">
          <div class="tl-tag">${typeLabels[item.type] || item.type}</div>
          <div class="tl-task">${item.title}</div>
          ${item.detail ? `<div class="tl-detail">${item.detail}</div>` : ''}
          <span class="tl-duration">${item.duration}</span>
        </div>
      </div>`;

    container.appendChild(div);

    if (animate) {
      setTimeout(() => div.classList.add('appeared'), 80 + idx * 55);
    } else {
      div.classList.add('appeared');
    }
  });

  summaryBar.innerHTML = `
    <div class="summary-stat"><span class="val">${schedule.length}</span><span class="lbl">blocks total</span></div>
    <div class="summary-stat"><span class="val">${focusBlocks}</span><span class="lbl">focus sessions</span></div>
    <div class="summary-stat"><span class="val">${mealCount}</span><span class="lbl">meals</span></div>
    <div class="summary-stat"><span class="val">${fmt(startTime)} – ${fmt(endTime)}</span><span class="lbl">day span</span></div>
  `;

  document.getElementById('loading-screen').classList.remove('visible');
  document.getElementById('input-screen').classList.add('hidden');

  const tlScreen = document.getElementById('timeline-screen');
  tlScreen.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => tlScreen.classList.add('shown')));
  document.getElementById('plan-btn').disabled = false;
}

function fmt(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')}${ampm}`;
}

function reset() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('timeline-screen').classList.remove('shown');
  setTimeout(() => {
    document.getElementById('timeline-screen').style.display = 'none';
    document.getElementById('input-screen').classList.remove('hidden');
  }, 300);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') generatePlan();
});
</script>
</body>
</html>
