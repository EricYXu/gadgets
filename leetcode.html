<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-light: #f0f0f0;
    --text: #111111;
    --text-muted: #999;
    --text-dim: #ccc;
    --accent: #1a1a1a;
    --accent-blue: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --orange: #d97706;
    --easy: #16a34a;
    --medium: #d97706;
    --hard: #dc2626;
    --max-w: 860px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }

  /* ── PICKER BAR ── */
  .picker-bar {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }
  .picker-inner {
    padding: 0 20px;
    height: 42px;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .picker-inner::-webkit-scrollbar { display: none; }

  .filter-tabs { display: flex; gap: 2px; flex-shrink: 0; }
  .filter-tab {
    padding: 3px 9px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.12s;
    border-radius: 3px;
  }
  .filter-tab.active { color: var(--text); background: var(--border-light); }
  .filter-tab:hover:not(.active) { color: var(--text); }

  .picker-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  .problem-chips { display: flex; gap: 5px; align-items: center; }
  .problem-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border: 1px solid var(--border);
    background: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    border-radius: 2px;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .problem-chip:hover { border-color: #aaa; color: var(--text); }
  .problem-chip.active { border-color: var(--text); background: var(--text); color: var(--surface); }
  .problem-chip.active .chip-dot { background: var(--surface) !important; }

  .chip-num { opacity: 0.45; font-size: 10px; }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .chip-dot.easy { background: var(--easy); }
  .chip-dot.medium { background: var(--medium); }
  .chip-dot.hard { background: var(--hard); }
  .chip-check { font-size: 9px; color: var(--green); }
  .problem-chip.active .chip-check { color: #aaffaa; }

  .picker-spacer { flex: 1; }
  .progress-text { color: var(--text-muted); font-size: 10px; flex-shrink: 0; letter-spacing: 0.04em; }

  /* ── MAIN SPLIT ── */
  .split {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── LEFT COLUMN ── */
  .pane-left {
    width: 46%;
    min-width: 320px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LEFT PANE: problem ── */
  .pane-problem {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 24px;
  }
  .pane-problem::-webkit-scrollbar { width: 3px; }
  .pane-problem::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── RIGHT PANE: editor ── */
  .pane-editor {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── PROBLEM META ROW ── */
  .prob-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .lc-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: all 0.12s;
    margin-left: auto;
  }
  .lc-link:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

  .diff-tag {
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .diff-tag.easy { color: var(--easy); background: rgba(22,163,74,0.08); }
  .diff-tag.medium { color: var(--medium); background: rgba(217,119,6,0.08); }
  .diff-tag.hard { color: var(--hard); background: rgba(220,38,38,0.08); }
  .tag-pill {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--border-light);
    padding: 2px 6px;
    border-radius: 2px;
  }

  /* ── PROBLEM CONTENT ── */
  .problem-desc { line-height: 1.75; color: #444; font-size: 13px; }
  .problem-desc p { margin-bottom: 12px; }
  .problem-desc strong { color: var(--text); }
  .problem-desc code { background: var(--border-light); padding: 1px 4px; border-radius: 2px; font-size: 12px; }

  .example-block {
    margin: 12px 0;
    background: var(--border-light);
    padding: 10px 14px;
    border-left: 2px solid var(--border);
  }
  .example-label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .example-content { color: #555; font-size: 12px; line-height: 1.7; }

  .constraints-block { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .constraints-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .constraint { color: #666; font-size: 12px; line-height: 1.9; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 6px;
  }
  .empty-state-main { font-size: 13px; }
  .empty-state-sub { font-size: 11px; color: var(--text-dim); }

  /* ── EDITOR TOOLBAR ── */
  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 40px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

  .lang-select {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11px;
    padding: 2px 7px;
    cursor: pointer;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.12s;
  }
  .lang-select:focus, .lang-select:hover { border-color: #aaa; }
  .lang-select option { background: #fff; color: #1a1a1a; }

  .code-actions { display: flex; gap: 5px; }
  .btn {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 12px;
    font-family: inherit; font-size: 11px; cursor: pointer;
    border: 1px solid var(--border); background: none;
    color: var(--text-muted);
    transition: all 0.12s; letter-spacing: 0.04em; border-radius: 2px;
  }
  .btn:hover { border-color: #aaa; color: var(--text); }
  .btn-primary { background: var(--text); border-color: var(--text); color: #fff; font-weight: 500; }
  .btn-primary:hover { background: #333; border-color: #333; }
  .btn-run { color: var(--accent-blue); border-color: rgba(37,99,235,0.25); }
  .btn-run:hover { background: rgba(37,99,235,0.05); border-color: rgba(37,99,235,0.5); color: var(--accent-blue); }

  /* ── EDITOR AREA ── */
  .editor-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .line-nums {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 42px;
    background: var(--border-light);
    border-right: 1px solid var(--border);
    padding: 14px 0;
    overflow: hidden; pointer-events: none; user-select: none;
  }
  .line-num {
    display: block; text-align: right; padding-right: 9px;
    color: var(--text-dim); font-size: 11px;
    height: calc(1.6 * 13px); line-height: calc(1.6 * 13px);
  }

  textarea.code-editor {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background: var(--surface);
    border: none; outline: none; resize: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.6;
    padding: 14px 16px 14px 56px;
    tab-size: 2; caret-color: var(--accent-blue);
  }

  /* ── OUTPUT PANEL ── */
  .output-panel {
    height: 190px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .output-header {
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px; height: 34px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .output-tab {
    font-size: 10px; color: var(--text-muted); cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.12s; padding-bottom: 1px;
    border-bottom: 1px solid transparent;
  }
  .output-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .output-tab:hover:not(.active) { color: var(--text); }

  .status-badge {
    margin-left: auto; font-size: 10px; padding: 1px 7px;
    border-radius: 2px; letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0; transition: opacity 0.2s;
  }
  .status-badge.visible { opacity: 1; }
  .status-badge.pass { color: var(--green); background: rgba(22,163,74,0.08); }
  .status-badge.fail { color: var(--red); background: rgba(220,38,38,0.08); }
  .status-badge.running { color: var(--orange); background: rgba(217,119,6,0.08); }

  .output-body { flex: 1; overflow-y: auto; padding: 10px 16px; font-size: 12px; }
  .output-body::-webkit-scrollbar { width: 3px; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border); }
  .output-empty { color: var(--text-dim); font-size: 11px; }

  .test-result { margin-bottom: 10px; animation: fadeIn 0.15s ease both; }
  .test-case-header { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; font-size: 11px; }
  .tc-icon { font-size: 10px; }
  .tc-icon.pass { color: var(--green); }
  .tc-icon.fail { color: var(--red); }
  .tc-name { color: var(--text-muted); }
  .tc-time { margin-left: auto; color: var(--text-dim); font-size: 10px; }
  .tc-detail { background: var(--border-light); padding: 6px 10px; font-size: 11px; line-height: 1.7; border-radius: 2px; }
  .tc-detail .label { color: var(--text-muted); }
  .tc-detail .val { color: var(--text); }
  .tc-detail .val.wrong { color: var(--red); }
  .tc-detail .val.right { color: var(--green); }

  .error-output {
    color: var(--red); font-size: 12px; line-height: 1.7; white-space: pre-wrap;
    background: rgba(220,38,38,0.04); padding: 8px 10px; border-radius: 2px;
  }

  /* ── PROGRESS TRACKER ── */
  .tracker-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    padding: 10px 32px 12px;
  }

  .tracker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .tracker-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .tracker-count {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .tally-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tally-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    padding: 0;
    outline: none;
  }
  .tally-dot:hover {
    border-color: var(--text-muted);
    transform: scale(1.2);
  }
  .tally-dot.filled {
    background: var(--text);
    border-color: var(--text);
  }
  .tally-dot.filled:hover {
    background: var(--red);
    border-color: var(--red);
    transform: scale(1.15);
  }

  /* color progression as reviews accumulate */
  .tally-dot:nth-child(1).filled { background: #d1d5db; border-color: #d1d5db; }
  .tally-dot:nth-child(2).filled { background: #9ca3af; border-color: #9ca3af; }
  .tally-dot:nth-child(3).filled { background: #6b7280; border-color: #6b7280; }
  .tally-dot:nth-child(4).filled { background: #374151; border-color: #374151; }
  .tally-dot:nth-child(5).filled { background: #111111; border-color: #111111; }

  /* overall progress bar */
  .overall-progress {
    padding: 8px 32px 10px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .overall-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .overall-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .overall-stats { font-size: 10px; color: var(--text-muted); }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-segments {
    display: flex;
    gap: 2px;
    margin-top: 5px;
  }
  .progress-seg {
    height: 3px;
    border-radius: 1px;
    flex: 1;
    transition: background 0.3s ease;
  }
  .progress-seg.solved { background: var(--green); }
  .progress-seg.attempted { background: var(--border); background: #d1d5db; }
  .progress-seg.unseen { background: var(--border-light); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .spinner {
    display: inline-block; width: 7px; height: 7px;
    border: 1px solid var(--orange); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── DIFF DOTS for chips ── */
  .diff-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .diff-easy { background: var(--easy); }
  .diff-medium { background: var(--medium); }
  .diff-hard { background: var(--hard); }
  .solved-check { color: var(--green); font-size: 9px; }
</style>
</head>
<body>
<!-- PICKER BAR -->
<div class="picker-bar">
  <div class="picker-inner">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="easy">Easy</button>
      <button class="filter-tab" data-filter="medium">Med</button>
      <button class="filter-tab" data-filter="hard">Hard</button>
    </div>
    <div class="picker-divider"></div>
    <div class="problem-chips" id="problem-chips"></div>
    <div class="picker-spacer"></div>
    <span class="progress-text" id="progress-text">0 / 0 solved</span>
  </div>
</div>

<!-- SPLIT PANE -->
<div class="split">

  <!-- LEFT COLUMN -->
  <div class="pane-left">

    <!-- LEFT: problem description -->
    <div class="pane-problem" id="pane-problem">
      <div class="empty-state" id="empty-state">
        <span class="empty-state-main">← Select a problem</span>
        <span class="empty-state-sub">Use the bar above to choose</span>
      </div>
      <div id="problem-view" style="display:none">
        <div class="prob-meta-row" id="prob-meta"></div>
        <div id="prob-body"></div>
      </div>
    </div>

    <!-- LEFT FOOTER: tracker + overall progress -->
    <div id="left-footer" style="display:none; flex-direction:column;">
      <div class="tracker-bar">
        <div class="tracker-header">
          <span class="tracker-label">Reviews</span>
          <span class="tracker-count" id="tracker-count">0 / 5</span>
        </div>
        <div class="tally-dots" id="tally-dots">
          <button class="tally-dot" data-idx="0" title="Review 1"></button>
          <button class="tally-dot" data-idx="1" title="Review 2"></button>
          <button class="tally-dot" data-idx="2" title="Review 3"></button>
          <button class="tally-dot" data-idx="3" title="Review 4"></button>
          <button class="tally-dot" data-idx="4" title="Review 5"></button>
        </div>
      </div>
      <div class="overall-progress">
        <div class="overall-header">
          <span class="overall-label">Overall Progress</span>
          <span class="overall-stats" id="overall-stats"></span>
        </div>
        <div class="progress-segments" id="progress-segments"></div>
      </div>
    </div>

  </div>

  <!-- RIGHT: editor + output -->
  <div class="pane-editor">
    <div class="editor-toolbar">
      <div class="toolbar-left">
        <span class="section-label">Solution</span>
        <select class="lang-select" id="lang-select">
          <option value="javascript">JavaScript</option>
          <option value="python" selected>Python</option>
        </select>
      </div>
      <div class="code-actions">
        <button class="btn btn-run" id="btn-run">▶ Run</button>
        <button class="btn btn-primary" id="btn-submit">Submit</button>
      </div>
    </div>

    <div class="editor-area">
      <div class="line-nums" id="line-nums"></div>
      <textarea class="code-editor" id="code-editor" spellcheck="false" placeholder="# Select a problem to start"></textarea>
    </div>

    <div class="output-panel">
      <div class="output-header">
        <span class="output-tab active" id="tab-cases" data-tab="cases">Test Cases</span>
        <span class="output-tab" id="tab-console" data-tab="console">Console</span>
        <div class="status-badge" id="status-badge"></div>
      </div>
      <div class="output-body" id="output-body">
        <div class="output-empty">Run your code to see results.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── PROBLEM DATA ──
const PROBLEMS = [
  {
    id: 1, slug: "two-sum", title: "Two Sum", difficulty: "easy",
    tags: ["Array", "Hash Table"],
    url: "https://leetcode.com/problems/two-sum/",
    description: `<p>Given an array of integers <strong>nums</strong> and an integer <strong>target</strong>, return indices of the two numbers such that they add up to target.</p>
<p>You may assume that each input would have <strong>exactly one solution</strong>, and you may not use the same element twice.</p>`,
    examples: [
      { input: "nums = [2,7,11,15], target = 9", output: "[0,1]", explanation: "nums[0] + nums[1] == 9, return [0, 1]." },
      { input: "nums = [3,2,4], target = 6", output: "[1,2]" },
    ],
    constraints: ["2 ≤ nums.length ≤ 10⁴", "-10⁹ ≤ nums[i] ≤ 10⁹", "-10⁹ ≤ target ≤ 10⁹", "Only one valid answer exists."],
    starterJs: `/**
 * @param {number[]} nums
 * @param {number} target
 * @return {number[]}
 */
function twoSum(nums, target) {
  // your code here
};`,
    starterPy: `class Solution:
    def twoSum(self, nums: list[int], target: int) -> list[int]:
        # your code here
        pass`,
    testCases: [
      { input: [[2,7,11,15], 9], expected: [0,1], label: "Example 1" },
      { input: [[3,2,4], 6], expected: [1,2], label: "Example 2" },
      { input: [[3,3], 6], expected: [0,1], label: "Example 3" },
    ],
    runFn: (code, lang) => {
      if (lang === 'javascript') {
        const fn = new Function(code + '\nreturn twoSum;')();
        return (tc) => fn(tc.input[0].slice(), tc.input[1]);
      } else {
        return (tc) => pyTwoSum(tc.input[0], tc.input[1], code);
      }
    }
  },

  {
    id: 20, slug: "valid-parentheses", title: "Valid Parentheses", difficulty: "easy",
    tags: ["String", "Stack"],
    url: "https://leetcode.com/problems/valid-parentheses/",
    description: `<p>Given a string <strong>s</strong> containing just the characters <code>'('</code>, <code>')'</code>, <code>'{'</code>, <code>'}'</code>, <code>'['</code> and <code>']'</code>, determine if the input string is valid.</p>
<p>An input string is valid if: open brackets are closed by the same type, open brackets are closed in the correct order, and every close bracket has a corresponding open bracket.</p>`,
    examples: [
      { input: 's = "()"', output: "true" },
      { input: 's = "()[]{}"', output: "true" },
      { input: 's = "(]"', output: "false" },
    ],
    constraints: ["1 ≤ s.length ≤ 10⁴", "s consists of parentheses only '()[]{}'"],
    starterJs: `/**
 * @param {string} s
 * @return {boolean}

// ── STATE ──
let currentProblem = null;
let currentLang = 'python';
let solvedSet = new Set(JSON.parse(localStorage.getItem('lc_solved') || '[]'));
let codeStore = JSON.parse(localStorage.getItem('lc_code') || '{}');
let reviewStore = JSON.parse(localStorage.getItem('lc_reviews') || '{}'); // { problemId: count 0-5 }
let activeFilter = 'all';
let activeTab = 'cases';
let consoleLog = [];

// ── INIT ──
function saveSolved() { localStorage.setItem('lc_solved', JSON.stringify([...solvedSet])); }
function saveCode() { localStorage.setItem('lc_code', JSON.stringify(codeStore)); }
function saveReviews() { localStorage.setItem('lc_reviews', JSON.stringify(reviewStore)); }

function getStoreKey(prob, lang) { return `${prob.id}_${lang}`; }

// ── TALLY / REVIEWS ──
function getReviews(probId) {
  return reviewStore[probId] || 0;
}

function setReviews(probId, count) {
  reviewStore[probId] = count;
  saveReviews();
}

function renderTally(probId) {
  const count = getReviews(probId);
  const dots = document.querySelectorAll('.tally-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < count);
    dot.title = i < count ? `Click to remove review ${i + 1}` : `Mark as reviewed ${i + 1}x`;
  });
  document.getElementById('tracker-count').textContent = `${count} / 5`;
}

function renderOverallProgress() {
  const total = PROBLEMS.length;
  const solved = solvedSet.size;
  const reviewed = PROBLEMS.filter(p => getReviews(p.id) > 0).length;
  document.getElementById('overall-stats').textContent = `${solved} solved · ${reviewed} reviewed`;

  const seg = document.getElementById('progress-segments');
  seg.innerHTML = PROBLEMS.map(p => {
    const isSolved = solvedSet.has(p.id);
    const rev = getReviews(p.id);
    let cls = 'unseen';
    if (isSolved) cls = 'solved';
    else if (rev > 0) cls = 'attempted';
    return `<span class="progress-seg ${cls}" title="${p.id}. ${p.title}"></span>`;
  }).join('');
}

// Wire tally dot clicks
document.querySelectorAll('.tally-dot').forEach(dot => {
  dot.addEventListener('click', function() {
    if (!currentProblem) return;
    const idx = parseInt(this.dataset.idx);
    const current = getReviews(currentProblem.id);
    // clicking a filled dot at the current max removes it; clicking unfilled adds up to it
    const newCount = (current === idx + 1) ? idx : idx + 1;
    setReviews(currentProblem.id, newCount);
    renderTally(currentProblem.id);
    renderOverallProgress();
    buildProblemList(); // refresh chips (in case we want to show review indicators)
  });
});

function buildProblemList() {
  const chips = document.getElementById('problem-chips');
  chips.innerHTML = '';
  const filtered = activeFilter === 'all' ? PROBLEMS : PROBLEMS.filter(p => p.difficulty === activeFilter);
  filtered.forEach(p => {
    const chip = document.createElement('button');
    const isActive = currentProblem?.id === p.id;
    const isSolved = solvedSet.has(p.id);
    chip.className = 'problem-chip' + (isActive ? ' active' : '') + (isSolved ? ' solved' : '');
    chip.innerHTML = `
      <span class="chip-num">${p.id}</span>
      <span>${p.title}</span>
      <span class="chip-dot ${p.difficulty}"></span>
      ${isSolved ? '<span class="chip-check">✓</span>' : ''}
    `;
    chip.addEventListener('click', () => selectProblem(p));
    chips.appendChild(chip);
  });
  updateProgress();
}

function updateProgress() {
  document.getElementById('progress-text').textContent = `${solvedSet.size} / ${PROBLEMS.length} solved`;
}

function selectProblem(p) {
  if (currentProblem) {
    const key = getStoreKey(currentProblem, currentLang);
    codeStore[key] = document.getElementById('code-editor').value;
    saveCode();
  }

  currentProblem = p;

  // Show problem view, hide empty state
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('problem-view').style.display = 'block';
  const footer = document.getElementById('left-footer');
  footer.style.display = 'flex';

  // tally + overall progress
  renderTally(p.id);
  renderOverallProgress();

  // meta row: diff tag + tags + lc link
  const meta = document.getElementById('prob-meta');
  meta.innerHTML =
    `<span class="diff-tag ${p.difficulty}">${p.difficulty}</span>` +
    p.tags.map(t => `<span class="tag-pill">${t}</span>`).join('') +
    `<a class="lc-link" href="${p.url}" target="_blank">#${p.id} ↗</a>`;

  // body
  let body = `<div class="problem-desc">${p.description}`;
  p.examples.forEach((ex, i) => {
    body += `<div class="example-block">
      <div class="example-label">Example ${i+1}</div>
      <div class="example-content">
        <div><span style="color:var(--text-muted)">Input: </span>${ex.input}</div>
        <div><span style="color:var(--text-muted)">Output: </span>${ex.output}</div>
        ${ex.explanation ? `<div><span style="color:var(--text-muted)">Explanation: </span>${ex.explanation}</div>` : ''}
      </div>
    </div>`;
  });
  body += `<div class="constraints-block">
    <div class="constraints-label">Constraints</div>
    ${p.constraints.map(c => `<div class="constraint">• ${c}</div>`).join('')}
  </div></div>`;
  document.getElementById('prob-body').innerHTML = body;

  // code
  const key = getStoreKey(p, currentLang);
  const saved = codeStore[key];
  const editor = document.getElementById('code-editor');
  editor.value = saved || (currentLang === 'javascript' ? p.starterJs : p.starterPy);
  updateLineNums();
  clearOutput();
  buildProblemList();
}

// ── EDITOR ──
const editor = document.getElementById('code-editor');

editor.addEventListener('input', updateLineNums);
editor.addEventListener('scroll', syncLineScroll);
editor.addEventListener('keydown', e => {
  const s = editor.selectionStart;
  const end = editor.selectionEnd;
  const val = editor.value;
  const INDENT = '  '; // 2 spaces

  // ── TAB: indent / dedent ──
  if (e.key === 'Tab') {
    e.preventDefault();
    if (s === end) {
      // No selection — insert indent at cursor
      editor.value = val.substring(0, s) + INDENT + val.substring(end);
      editor.selectionStart = editor.selectionEnd = s + INDENT.length;
    } else {
      // Selection — indent or dedent each selected line
      const lineStart = val.lastIndexOf('\n', s - 1) + 1;
      const lineEnd = val.indexOf('\n', end - 1);
      const block = val.substring(lineStart, lineEnd === -1 ? val.length : lineEnd);
      const lines = block.split('\n');
      const modified = e.shiftKey
        ? lines.map(l => l.startsWith(INDENT) ? l.slice(INDENT.length) : l.startsWith(' ') ? l.slice(1) : l)
        : lines.map(l => INDENT + l);
      const newBlock = modified.join('\n');
      editor.value = val.substring(0, lineStart) + newBlock + val.substring(lineEnd === -1 ? val.length : lineEnd);
      editor.selectionStart = lineStart;
      editor.selectionEnd = lineStart + newBlock.length;
    }
    updateLineNums();
    return;
  }

  // ── ENTER: auto-indent ──
  if (e.key === 'Enter') {
    e.preventDefault();
    const lineStart = val.lastIndexOf('\n', s - 1) + 1;
    const currentLine = val.substring(lineStart, s);
    // Grab leading whitespace of current line
    const leadingSpace = currentLine.match(/^(\s*)/)[1];
    // Check if line ends with a block-opener (Python colon or JS brace)
    const trimmed = currentLine.trimEnd();
    const opensBlock = trimmed.endsWith(':') || trimmed.endsWith('{') || trimmed.endsWith('(');
    const extraIndent = opensBlock ? INDENT : '';
    const insert = '\n' + leadingSpace + extraIndent;
    editor.value = val.substring(0, s) + insert + val.substring(end);
    editor.selectionStart = editor.selectionEnd = s + insert.length;
    updateLineNums();
    syncLineScroll();
    return;
  }

  // ── BACKSPACE: remove whole indent block ──
  if (e.key === 'Backspace' && s === end && s > 0) {
    const lineStart = val.lastIndexOf('\n', s - 1) + 1;
    const beforeCursor = val.substring(lineStart, s);
    // If everything before cursor on this line is spaces, delete one indent worth
    if (beforeCursor.length > 0 && beforeCursor.trim() === '') {
      e.preventDefault();
      const toRemove = beforeCursor.length % INDENT.length === 0 ? INDENT.length : beforeCursor.length % INDENT.length;
      editor.value = val.substring(0, s - toRemove) + val.substring(s);
      editor.selectionStart = editor.selectionEnd = s - toRemove;
      updateLineNums();
      return;
    }
  }

  // ── AUTO-CLOSE brackets & quotes ──
  const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
  const closers = new Set([')', ']', '}']);
  if (pairs[e.key]) {
    const nextChar = val[s];
    // Skip auto-close for quotes if cursor is already before the same char
    if ((e.key === '"' || e.key === "'") && nextChar === e.key) {
      e.preventDefault();
      editor.selectionStart = editor.selectionEnd = s + 1;
      return;
    }
    e.preventDefault();
    const close = pairs[e.key];
    editor.value = val.substring(0, s) + e.key + close + val.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 1;
    updateLineNums();
    return;
  }
  // Skip over existing closing bracket if typed manually
  if (closers.has(e.key) && val[s] === e.key) {
    e.preventDefault();
    editor.selectionStart = editor.selectionEnd = s + 1;
    return;
  }
});

function updateLineNums() {
  const lines = editor.value.split('\n').length;
  const container = document.getElementById('line-nums');
  let html = '';
  for (let i = 1; i <= Math.max(lines, 1); i++) {
    html += `<span class="line-num">${i}</span>`;
  }
  container.innerHTML = html;
}

function syncLineScroll() {
  document.getElementById('line-nums').scrollTop = editor.scrollTop;
}

updateLineNums();

// ── LANG SELECT ──
document.getElementById('lang-select').addEventListener('change', function() {
  if (currentProblem) {
    const oldKey = getStoreKey(currentProblem, currentLang);
    codeStore[oldKey] = editor.value;
    saveCode();
  }
  currentLang = this.value;
  if (currentProblem) {
    const key = getStoreKey(currentProblem, currentLang);
    editor.value = codeStore[key] || (currentLang === 'javascript' ? currentProblem.starterJs : currentProblem.starterPy);
    updateLineNums();
  }
});

// ── FILTERS ──
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    buildProblemList();
  });
});

// ── OUTPUT TABS ──
document.querySelectorAll('.output-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    activeTab = this.dataset.tab;
    if (activeTab === 'console') renderConsole();
  });
});

// ── RUN / SUBMIT ──
function clearOutput() {
  const badge = document.getElementById('status-badge');
  badge.className = 'status-badge';
  document.getElementById('output-body').innerHTML = '<div class="output-empty">Run your code to see results.</div>';
  consoleLog = [];
}

function setStatus(state, text) {
  const badge = document.getElementById('status-badge');
  badge.className = `status-badge visible ${state}`;
  badge.textContent = text;
}

function equal(a, b) {
  if (Array.isArray(a) && Array.isArray(b)) {
    if (a.length !== b.length) return false;
    return a.every((v, i) => equal(v, b[i]));
  }
  return a === b;
}

function fmt(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return '[' + v.map(fmt).join(', ') + ']';
  return String(v);
}

async function runTests(submitMode) {
  if (!currentProblem) return;

  setStatus('running', submitMode ? 'Judging...' : 'Running...');
  document.getElementById('output-body').innerHTML = `<div class="output-empty"><span class="spinner"></span> &nbsp;Executing...</div>`;

  await new Promise(r => setTimeout(r, 300));

  const code = editor.value;
  consoleLog = [];

  // capture console.log
  const origLog = console.log;
  console.log = (...args) => { consoleLog.push(args.map(String).join(' ')); origLog(...args); };

  let results = [];
  let globalError = null;

  try {
    if (currentLang !== 'javascript') {
      globalError = "Python execution is not supported in the browser.\nUse the JavaScript version to test your solution.";
    } else {
      const runCase = currentProblem.runFn(code, currentLang);
      for (const tc of currentProblem.testCases) {
        let got, err = null, t0 = performance.now();
        try { got = runCase(tc); } catch(e) { err = e.message; }
        const ms = (performance.now() - t0).toFixed(1);
        const pass = err ? false : equal(got, tc.expected);
        results.push({ tc, got, err, pass, ms });
      }
    }
  } catch(e) {
    globalError = e.message;
  }

  console.log = origLog;

  // render
  if (globalError) {
    setStatus('fail', 'Error');
    document.getElementById('output-body').innerHTML =
      `<div class="error-output">Runtime Error:\n${globalError}</div>`;
    return;
  }

  const allPass = results.every(r => r.pass);
  if (allPass && submitMode) {
    solvedSet.add(currentProblem.id);
    saveSolved();
    buildProblemList(); // rebuilds chips
  }

  setStatus(allPass ? 'pass' : 'fail', allPass ? (submitMode ? 'Accepted' : 'All Pass') : 'Wrong Answer');

  if (activeTab === 'console') {
    renderConsole();
  } else {
    renderResults(results);
  }
}

function renderResults(results) {
  const body = document.getElementById('output-body');
  if (!results.length) { body.innerHTML = '<div class="output-empty">No test cases.</div>'; return; }

  body.innerHTML = results.map((r, i) => `
    <div class="test-result" style="animation-delay:${i*0.05}s">
      <div class="test-case-header">
        <span class="tc-icon ${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'}</span>
        <span class="tc-name">${r.tc.label}</span>
        <span class="tc-time">${r.ms}ms</span>
      </div>
      <div class="tc-detail">
        <div><span class="label">Input: </span><span class="val">${r.tc.input.map(fmt).join(', ')}</span></div>
        <div><span class="label">Expected: </span><span class="val right">${fmt(r.tc.expected)}</span></div>
        <div><span class="label">Got: </span><span class="val ${r.pass ? 'right' : 'wrong'}">${r.err ? '⚠ ' + r.err : fmt(r.got)}</span></div>
      </div>
    </div>
  `).join('');
}

function renderConsole() {
  const body = document.getElementById('output-body');
  if (!consoleLog.length) {
    body.innerHTML = '<div class="output-empty">No console output.</div>';
  } else {
    body.innerHTML = `<div class="error-output" style="color:var(--text)">${consoleLog.map(l => '> ' + l).join('\n')}</div>`;
  }
}

document.getElementById('btn-run').addEventListener('click', () => runTests(false));
document.getElementById('btn-submit').addEventListener('click', () => runTests(true));

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    runTests(false);
  }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'Enter') {
    e.preventDefault();
    runTests(true);
  }
});

// ── BOOT ──
buildProblemList();
renderOverallProgress();
</script>
