<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Strategic Career Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f5f2eb;
    --cream: #ede9df;
    --gold: #b8952a;
    --gold-light: #d4a93a;
    --red: #c0392b;
    --muted: #8a8070;
    --border: #d4cfc5;
    --white: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--ink);
  }
  .logo span { color: var(--gold); }

  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .api-key-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-key-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }

  .api-key-input {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    padding: 5px 10px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.04em;
  }
  .api-key-input:focus { border-color: var(--gold); }
  .api-key-input::placeholder { color: var(--border); }

  /* MAIN LAYOUT */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 61px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 28px 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 24px 10px;
  }

  .goal-tabs {
    flex: 1;
    overflow-y: auto;
  }

  .goal-tab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 24px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .goal-tab:hover { background: var(--cream); }
  .goal-tab.active {
    background: var(--cream);
    border-left-color: var(--gold);
  }

  .goal-tab-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 16px;
    flex-shrink: 0;
  }

  .goal-tab-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }

  .goal-tab-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    padding: 2px;
    transition: opacity 0.15s, color 0.15s;
  }
  .goal-tab:hover .goal-tab-delete { opacity: 1; }
  .goal-tab-delete:hover { color: var(--red); }

  .add-goal-btn {
    margin: 16px 24px 0;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-goal-btn:hover { background: var(--gold); }

  /* SIDEBAR CALENDAR */
  .sidebar-cal {
    margin: 24px;
    border: 1px solid var(--border);
    background: var(--white);
  }

  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .cal-month {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
  }

  .cal-nav {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    padding: 2px 6px;
    transition: color 0.15s;
  }
  .cal-nav:hover { color: var(--ink); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 8px;
    gap: 2px;
  }

  .cal-day-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    text-align: center;
    color: var(--muted);
    padding: 4px 0;
    letter-spacing: 0.05em;
  }

  .cal-day {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-align: center;
    padding: 5px 2px;
    cursor: pointer;
    border-radius: 2px;
    color: var(--ink);
    transition: background 0.1s;
    position: relative;
  }
  .cal-day:hover { background: var(--cream); }
  .cal-day.today {
    background: var(--ink);
    color: var(--paper);
    border-radius: 2px;
  }
  .cal-day.has-event::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 3px;
    background: var(--gold);
    border-radius: 50%;
  }
  .cal-day.other-month { color: var(--border); }

  /* MAIN CONTENT */
  .main {
    padding: 36px 48px;
    overflow-y: auto;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 16px;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.2;
  }

  .empty-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--muted);
  }

  .empty-sub {
    font-size: 14px;
    color: var(--muted);
    max-width: 340px;
    line-height: 1.6;
  }

  /* GOAL INPUT PANEL */
  .goal-input-panel {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 32px;
    animation: fadeSlide 0.25s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .goal-title-input {
    width: 100%;
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    border-bottom: 2px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 20px;
    transition: border-color 0.15s;
  }
  .goal-title-input:focus { border-bottom-color: var(--gold); }
  .goal-title-input::placeholder { color: var(--border); }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .input-group input, .input-group select, .input-group textarea {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--paper);
    padding: 9px 12px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-group input:focus,
  .input-group select:focus,
  .input-group textarea:focus { border-color: var(--gold); }

  .input-group textarea {
    resize: vertical;
    min-height: 80px;
    font-size: 13px;
    line-height: 1.5;
  }

  .generate-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 13px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .generate-btn:hover { background: var(--gold); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STRATEGY PANEL */
  .strategy-panel {
    animation: fadeSlide 0.3s ease;
  }

  .goal-hero {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .goal-hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1.2;
    max-width: 580px;
  }

  .goal-meta {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-shrink: 0;
    margin-left: 24px;
  }

  .meta-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .meta-chip.high { border-color: var(--red); color: var(--red); }
  .meta-chip.medium { border-color: var(--gold); color: var(--gold); }

  .progress-bar-wrap {
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.5s ease;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 36px;
    text-align: right;
  }

  /* SECTIONS */
  .strategy-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }

  .strategy-full {
    margin-bottom: 28px;
  }

  .section-card {
    border: 1px solid var(--border);
    background: var(--white);
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-icon {
    font-size: 14px;
    opacity: 0.7;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-body { padding: 16px 20px; }

  /* ACTION ITEMS */
  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--cream);
  }
  .action-item:last-child { border-bottom: none; }

  .action-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .action-check.done { background: var(--ink); border-color: var(--ink); }
  .action-check.done::after {
    content: '✓';
    color: white;
    font-size: 9px;
  }

  .action-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
  }
  .action-text.done {
    text-decoration: line-through;
    color: var(--muted);
  }

  .action-priority {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .action-priority.p1 { background: #fcecea; color: var(--red); }
  .action-priority.p2 { background: #fdf5e6; color: var(--gold); }
  .action-priority.p3 { background: var(--cream); color: var(--muted); }

  /* TIMELINE */
  .timeline-item {
    display: flex;
    gap: 16px;
    padding: 8px 0;
    position: relative;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: 49px;
    top: 24px;
    bottom: -8px;
    width: 1px;
    background: var(--border);
  }
  .timeline-item:last-child::before { display: none; }

  .timeline-week {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    width: 48px;
    flex-shrink: 0;
    padding-top: 3px;
  }

  .timeline-dot {
    width: 8px;
    height: 8px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
    background: var(--white);
  }

  .timeline-content {
    flex: 1;
  }

  .timeline-label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .timeline-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* OUTREACH TABLE */
  .outreach-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--cream);
    align-items: center;
    font-size: 12px;
  }
  .outreach-row:last-child { border-bottom: none; }
  .outreach-row.header {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-top: 0;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.pending { background: var(--gold); }
  .status-dot.done { background: #27ae60; }
  .status-dot.todo { background: var(--border); }

  /* REMINDERS */
  .reminder-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--cream);
    font-size: 12px;
  }
  .reminder-item:last-child { border-bottom: none; }

  .reminder-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    width: 80px;
    flex-shrink: 0;
  }

  .add-reminder-btn {
    background: none;
    border: 1px dashed var(--border);
    padding: 9px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    width: 100%;
  }
  .add-reminder-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.5);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--white);
    border: 1px solid var(--border);
    width: 480px;
    max-width: 95vw;
    padding: 32px;
    animation: fadeSlide 0.2s ease;
  }

  .modal h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--gold); }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

  /* LOADING */
  .ai-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 20px;
    color: var(--muted);
  }

  .ai-loading-dots {
    display: flex;
    gap: 6px;
  }
  .ai-loading-dots span {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .ai-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ai-loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .ai-loading-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* EDIT GOAL BUTTON */
  .edit-goal-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .edit-goal-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-date" id="headerDate"></div>
  <div class="api-key-wrap">
    <span class="api-key-label">API Key</span>
    <input class="api-key-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" />
  </div>
</header>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-label">Goals</div>
    <div class="goal-tabs" id="goalTabs"></div>
    <button class="add-goal-btn" onclick="openNewGoalModal()">
      <span>+</span> New Goal
    </button>

    <!-- MINI CALENDAR -->
    <div style="margin-top:auto">
      <div style="padding: 24px 24px 8px">
        <div class="sidebar-section-label" style="padding:0 0 0 0">Calendar</div>
      </div>
      <div class="sidebar-cal">
        <div class="cal-header">
          <button class="cal-nav" onclick="calNav(-1)">‹</button>
          <div class="cal-month" id="calMonth"></div>
          <button class="cal-nav" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◈</div>
      <div class="empty-title">No goals yet.</div>
      <div class="empty-sub">Add your first career goal and APEX will build a precise action plan, outreach strategy, and daily schedule.</div>
      <button class="generate-btn" style="margin-top:8px" onclick="openNewGoalModal()">
        <span>+</span> Define a Goal
      </button>
    </div>
  </main>
</div>

<!-- NEW GOAL MODAL -->
<div class="modal-overlay" id="newGoalModal" style="display:none">
  <div class="modal">
    <h3>Define Your Goal</h3>
    <div class="input-group" style="margin-bottom:16px">
      <label>Goal Title</label>
      <input type="text" id="modalGoalTitle" placeholder="e.g. Become VP of Product at Series B startup" />
    </div>
    <div class="input-group" style="margin-bottom:16px">
      <label>Context & Background</label>
      <textarea id="modalGoalContext" placeholder="Your current role, skills, constraints, timeline..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="input-group">
        <label>Deadline</label>
        <input type="text" id="modalGoalDeadline" placeholder="e.g. 6 months" />
      </div>
      <div class="input-group">
        <label>Priority</label>
        <select id="modalGoalPriority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">

// ── STATE ──────────────────────────────────────────────────────────────────────

// ── DATE ───────────────────────────────────────────────────────────────────────
const now = new Date();
document.getElementById('headerDate').textContent =

// ── CALENDAR ───────────────────────────────────────────────────────────────────
function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent = `${months[calDate.getMonth()]} ${calDate.getFullYear()}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
  const daysInMonth = new Date(calDate.getFullYear(), calDate.getMonth()+1, 0).getDate();
  const prevDays = new Date(calDate.getFullYear(), calDate.getMonth(), 0).getDate();

  // Collect all event dates
  const eventDates = new Set();
  goals.forEach(g => {
    (g.reminders || []).forEach(r => {
      if (r.freq === 'Daily' || r.freq === 'Weekdays') {
        for (let i = 1; i <= daysInMonth; i++) {
          const d2 = new Date(calDate.getFullYear(), calDate.getMonth(), i);
          if (r.freq === 'Weekdays' && (d2.getDay() === 0 || d2.getDay() === 6)) continue;
          eventDates.add(i);
        }
      }
    });
  });

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - firstDay + 1 + i;
    grid.appendChild(el);
  }

  for (let i = 1; i <= daysInMonth; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = i;
    if (i === now.getDate() && calDate.getMonth() === now.getMonth() && calDate.getFullYear() === now.getFullYear()) {
      el.classList.add('today');
    }
    if (eventDates.has(i)) el.classList.add('has-event');
    grid.appendChild(el);
  }
}

  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);

}

// ── ROBUST JSON EXTRACTION ─────────────────────────────────────────────────────
function extractJSON(raw) {
  // 1. Strip markdown fences
  let text = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

  // 2. Try direct parse first
  try { return JSON.parse(text); } catch (_) {}

  // 3. Find outermost { } block
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) {
    const block = text.slice(start, end + 1);
    try { return JSON.parse(block); } catch (_) {}

    // 4. Fix common issues: single quotes, trailing commas, unquoted keys
    let fixed = block
      .replace(/,\s*([}\]])/g, '$1')           // trailing commas
      .replace(/([{,]\s*)(\w+)(\s*:)/g, '$1"$2"$3') // unquoted keys
      .replace(/:\s*'([^']*)'/g, ': "$1"')     // single-quoted values
      .replace(/[\u2018\u2019]/g, "'")          // curly apostrophes
      .replace(/[\u201C\u201D]/g, '"');         // curly quotes
    try { return JSON.parse(fixed); } catch (_) {}
  }

  // 5. Field-by-field extraction fallback
  const get = (key) => {
    const m = text.match(new RegExp(`"${key}"\\s*:\\s*"([^"]*)"`, 'i'));
    return m ? m[1] : '';
  };
  const getArr = (key) => {
    const m = text.match(new RegExp(`"${key}"\\s*:\\s*(\\[[\\s\\S]*?\\])`, 'i'));
    if (!m) return [];
    try { return JSON.parse(m[1]); } catch (_) { return []; }
  };
  return {
    summary: get('summary'),
    keyInsight: get('keyInsight'),
    actions: getArr('actions'),
    timeline: getArr('timeline'),
    outreach: getArr('outreach'),
    reminders: getArr('reminders'),
    metrics: getArr('metrics'),
  };
}

// ── AI STRATEGY ────────────────────────────────────────────────────────────────
async function generateStrategy(goalId) {
  const goal = goals.find(g => g.id === goalId);
  if (!goal) return;

  document.getElementById('mainContent').innerHTML = `
    <div class="ai-loading">
      <div class="ai-loading-dots"><span></span><span></span><span></span></div>
      <div class="ai-loading-label">Building your strategy...</div>
    </div>`;

  const prompt = `You are a world-class career strategist advising a senior professional. Your job is to produce the single most useful action plan possible for this goal — not generic advice that could apply to anyone, but sharp, specific moves that directly unlock this outcome.

GOAL: ${goal.title}
CONTEXT: ${goal.context || 'Not specified'}
DEADLINE: ${goal.deadline || 'Not specified'}
PRIORITY: ${goal.priority}

RULES FOR ACTIONS (enforce strictly):
- Every action must be concrete and immediately executable — no vague verbs like "network more" or "improve your skills"
- P1 actions = the 2-3 moves that will make or break this goal; things most people avoid but that create asymmetric leverage
- P2 actions = high-value weekly habits that compound over time
- P3 actions = supporting tasks that matter but aren't blocking
- Name specific tactics: e.g. "DM 3 people who recently got promoted to [role] on LinkedIn and ask for a 20-min call about their path" not "reach out to your network"
- If context reveals the person's background, tailor actions to their exact situation
- Include at least one action most people wouldn't think of but that insiders know matters
- keyInsight must be the one uncomfortable truth about what actually determines success here — not a platitude

CRITICAL: Respond with ONLY a raw JSON object. No markdown, no backticks, no explanation before or after. Start with { and end with }.

{"summary":"2-3 sentence strategic framing of the real path to success","keyInsight":"the one uncomfortable truth insiders know about succeeding at this goal","actions":[{"text":"specific executable action with exact method","priority":"p1","category":"immediate"},{"text":"specific executable action","priority":"p1","category":"immediate"},{"text":"specific executable action","priority":"p2","category":"weekly"},{"text":"specific executable action","priority":"p2","category":"weekly"},{"text":"specific executable action","priority":"p1","category":"immediate"},{"text":"specific executable action","priority":"p3","category":"ongoing"},{"text":"specific executable action","priority":"p3","category":"ongoing"}],"timeline":[{"week":"Week 1-2","label":"phase name","desc":"specific milestones to hit"},{"week":"Week 3-4","label":"phase name","desc":"specific milestones to hit"},{"week":"Month 2","label":"phase name","desc":"specific milestones to hit"},{"week":"Month 3","label":"phase name","desc":"specific milestones to hit"},{"week":"Month 4-6","label":"phase name","desc":"specific milestones to hit"}],"outreach":[{"who":"specific role/person type and why they matter","channel":"LinkedIn","status":"todo"},{"who":"specific role/person type and why they matter","channel":"Email","status":"todo"},{"who":"specific role/person type and why they matter","channel":"Event","status":"todo"},{"who":"specific role/person type and why they matter","channel":"LinkedIn","status":"todo"},{"who":"specific role/person type and why they matter","channel":"Referral","status":"todo"}],"reminders":[{"task":"specific daily action tied to the goal","time":"8:00 AM","freq":"Daily"},{"task":"specific weekday habit","time":"9:00 AM","freq":"Weekdays"},{"task":"specific weekly review or outreach task","time":"6:00 PM","freq":"Weekly"}],"metrics":[{"label":"metric name","value":"0 / target"},{"label":"metric name","value":"0 / target"},{"label":"metric name","value":"0 / target"}]}

Use only double quotes. No trailing commas.`;

  try {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!apiKey) {
      document.getElementById('mainContent').innerHTML = `
        <div class="ai-loading">
          <div style="font-size:24px">🔑</div>
          <div class="ai-loading-label">Enter your Anthropic API key in the top-right</div>
        </div>`;
      return;
    }
    const resp = await fetch('https://gadgets.ericxu2025.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    const raw = (data.content || []).map(b => b.text || '').join('');
    const strategy = extractJSON(raw);

    if (!strategy || !strategy.summary) throw new Error('Could not parse strategy — please retry.');

    goal.strategy = strategy;
    if (strategy.reminders && !goal.remindersLoaded) {
      goal.reminders = strategy.reminders.map((r, i) => ({ id: 'r'+Date.now()+i, ...r }));
      goal.remindersLoaded = true;
    }
    save();
    showGoal(goalId);
  } catch (err) {
    console.error(err);
    document.getElementById('mainContent').innerHTML = `
      <div class="ai-loading">
        <div style="font-size:24px">⚠</div>
        <div class="ai-loading-label">Strategy generation failed</div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px;max-width:360px;text-align:center">${escHtml(err.message)}</div>
        <button class="generate-btn" style="margin-top:20px" onclick="generateStrategy('${goalId}')">↻ Retry</button>
      </div>`;
  }
}

// ── SHOW GOAL ──────────────────────────────────────────────────────────────────
function showGoal(id) {
  activeGoalId = id;
  renderTabs();
  const goal = goals.find(g => g.id === id);
  if (!goal) return showEmpty();

  if (!goal.strategy) {
    generateStrategy(id);
    return;
  }

  const s = goal.strategy;
  const doneCount = Object.values(goal.checks || {}).filter(Boolean).length;
  const totalActions = (s.actions || []).length;
  const pct = totalActions ? Math.round((doneCount / totalActions) * 100) : 0;

  const priorityClass = goal.priority === 'high' ? 'high' : goal.priority === 'medium' ? 'medium' : '';

  document.getElementById('mainContent').innerHTML = `
    <div class="strategy-panel" id="stratPanel_${id}">
      <div class="goal-hero">
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Strategic Goal</div>
          <div class="goal-hero-title">${escHtml(goal.title)}</div>
          ${goal.context ? `<div style="font-size:13px;color:var(--muted);margin-top:10px;max-width:560px">${escHtml(goal.context)}</div>` : ''}
        </div>
        <div class="goal-meta">
          ${goal.deadline ? `<div class="meta-chip">${escHtml(goal.deadline)}</div>` : ''}
          <div class="meta-chip ${priorityClass}">${goal.priority} priority</div>
          <button class="edit-goal-btn" onclick="generateStrategy('${id}')">↻ Regenerate</button>
        </div>
      </div>

      ${s.summary ? `
      <div style="background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);padding:20px 24px;margin-bottom:28px">
        <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Strategic Brief</div>
        <p style="font-size:14px;line-height:1.6;margin-bottom:${s.keyInsight?'12px':'0'}">${escHtml(s.summary)}</p>
        ${s.keyInsight ? `<p style="font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:12px">🔑 ${escHtml(s.keyInsight)}</p>` : ''}
      </div>` : ''}

      <div class="progress-bar-wrap">
        <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);flex-shrink:0">Progress</div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}%</div>
      </div>

      <div class="strategy-grid">
        <!-- ACTIONS -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-header-left">
              <span class="section-icon">◎</span>
              <span class="section-title">Priority Actions</span>
            </div>
          </div>
          <div class="section-body" id="actions_${id}">
            ${renderActions(goal)}
          </div>
        </div>

        <!-- TIMELINE -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-header-left">
              <span class="section-icon">◷</span>
              <span class="section-title">Execution Timeline</span>
            </div>
          </div>
          <div class="section-body">
            ${(s.timeline||[]).map(t => `
              <div class="timeline-item">
                <div class="timeline-week">${escHtml(t.week)}</div>
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                  <div class="timeline-label">${escHtml(t.label)}</div>
                  <div class="timeline-desc">${escHtml(t.desc)}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="strategy-grid">
        <!-- OUTREACH -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-header-left">
              <span class="section-icon">◉</span>
              <span class="section-title">Outreach Targets</span>
            </div>
          </div>
          <div class="section-body">
            <div class="outreach-row header">
              <div>Target</div><div>Channel</div><div>Status</div>
            </div>
            ${(s.outreach||[]).map((o,i) => `
              <div class="outreach-row">
                <div style="font-size:12px">${escHtml(o.who)}</div>
                <div style="font-size:11px;color:var(--muted)">${escHtml(o.channel)}</div>
                <div>
                  <span class="status-dot ${o.status}"></span>
                  <select style="border:none;background:none;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);cursor:pointer;outline:none;text-transform:uppercase;letter-spacing:.05em"
                    onchange="updateOutreach('${id}',${i},this.value)">
                    <option value="todo" ${o.status==='todo'?'selected':''}>TO DO</option>
                    <option value="pending" ${o.status==='pending'?'selected':''}>SENT</option>
                    <option value="done" ${o.status==='done'?'selected':''}>DONE</option>
                  </select>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- REMINDERS -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-header-left">
              <span class="section-icon">◔</span>
              <span class="section-title">Daily Reminders</span>
            </div>
          </div>
          <div class="section-body">
            <div id="reminders_${id}">
              ${renderReminders(goal)}
            </div>
            <button class="add-reminder-btn" onclick="openReminderModal('${id}')">+ Add Reminder</button>
          </div>
        </div>
      </div>

      <!-- METRICS -->
      ${s.metrics && s.metrics.length ? `
      <div class="strategy-full">
        <div class="section-card">
          <div class="section-header">
            <div class="section-header-left">
              <span class="section-icon">◈</span>
              <span class="section-title">Success Metrics</span>
            </div>
          </div>
          <div class="section-body">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:4px 0">
              ${(s.metrics||[]).map(m => `
                <div style="border:1px solid var(--border);padding:14px 16px">
                  <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${escHtml(m.label)}</div>
                  <div style="font-family:'DM Serif Display',serif;font-size:20px">${escHtml(m.value)}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>` : ''}
    </div>`;

  renderCalendar();
}

function renderActions(goal) {
  if (!goal.strategy || !goal.strategy.actions) return '';
  return goal.strategy.actions.map((a, i) => {
    const key = `a_${i}`;
    const done = (goal.checks || {})[key];
    return `
      <div class="action-item">
        <div class="action-check ${done?'done':''}" onclick="toggleCheck('${goal.id}','${key}')"></div>
        <div class="action-text ${done?'done':''}">${escHtml(a.text)}</div>
        <span class="action-priority ${a.priority}">${a.priority.toUpperCase()}</span>
      </div>`;
  }).join('');
}

function renderReminders(goal) {
  return (goal.reminders || []).map((r, i) => `
    <div class="reminder-item">
      <div class="reminder-time">${escHtml(r.time||'')}</div>
      <div style="flex:1;font-size:12px">${escHtml(r.task||'')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-right:8px">${escHtml(r.freq||'')}</div>
      <button onclick="deleteReminder('${goal.id}',${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px" title="Remove">×</button>
    </div>`).join('') || `<div style="font-size:12px;color:var(--muted);padding:8px 0">No reminders yet.</div>`;
}

function toggleCheck(goalId, key) {
  const goal = goals.find(g => g.id === goalId);
  if (!goal) return;
  goal.checks = goal.checks || {};
  goal.checks[key] = !goal.checks[key];
  save();
  // re-render actions + progress
  const actionsEl = document.getElementById('actions_' + goalId);
  if (actionsEl) actionsEl.innerHTML = renderActions(goal);
  // update progress bar
  const s = goal.strategy;
  if (!s) return;
  const doneCount = Object.values(goal.checks).filter(Boolean).length;
  const pct = s.actions.length ? Math.round((doneCount / s.actions.length) * 100) : 0;
  const fill = document.querySelector(`#stratPanel_${goalId} .progress-bar-fill`);
  const pctEl = document.querySelector(`#stratPanel_${goalId} .progress-pct`);
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

function updateOutreach(goalId, idx, status) {
  const goal = goals.find(g => g.id === goalId);
  if (!goal || !goal.strategy) return;
  goal.strategy.outreach[idx].status = status;
  save();
}

function openReminderModal(goalId) {
  document.getElementById('reminderTask').value = '';
  document.getElementById('reminderTime').value = '';
  document.getElementById('reminderModal').dataset.goalId = goalId;
  document.getElementById('reminderModal').style.display = 'flex';
  setTimeout(() => document.getElementById('reminderTask').focus(), 100);
}

function saveReminder() {
  const goalId = document.getElementById('reminderModal').dataset.goalId;
  const goal = goals.find(g => g.id === goalId);
  if (!goal) return;
  const task = document.getElementById('reminderTask').value.trim();
  const time = document.getElementById('reminderTime').value.trim();
  const freq = document.getElementById('reminderFreq').value;
  if (!task) return;
  goal.reminders = goal.reminders || [];
  goal.reminders.push({ id: 'r' + Date.now(), task, time, freq });
  save();
  closeModal();
  const remEl = document.getElementById('reminders_' + goalId);
  if (remEl) remEl.innerHTML = renderReminders(goal);
  renderCalendar();
}

function deleteReminder(goalId, idx) {
  const goal = goals.find(g => g.id === goalId);
  if (!goal) return;
  goal.reminders.splice(idx, 1);
  save();
  const remEl = document.getElementById('reminders_' + goalId);
  if (remEl) remEl.innerHTML = renderReminders(goal);
  renderCalendar();
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────────
renderTabs();
if (goals.length) {
  activeGoalId = goals[0].id;
  renderTabs();
  showGoal(activeGoalId);
}
</script>
